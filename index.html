<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Website</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f3;
        color: #222;
      }

      main {
        width: min(92vw, 640px);
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 24px;
        font-size: 1.125rem;
      }

      a {
        color: #0f6bff;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #181818;
          color: #f2f2f2;
        }

        a {
          color: #8ab4ff;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>My Website</h1>
      <p>GitHub Pagesで公開するシンプルなWebサイトです。</p>
      <p>
        このページは <strong>index.html</strong> から表示されています。
      </p>
    </main>
  </body>
</html>
